    <style>
        /* ===== RESPONSIVE SPÉCIFIQUE À LA PAGE CONTACT ===== */

        /* Base : grille de certificats responsive */
        .certi {
            max-width: 95vw;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .certi a {
            display: block;
        }

        .certi img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            cursor: pointer;
            padding: 12px;
            box-sizing: border-box;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .certi img:hover {
            transform: scale(1.08);
        }

        /* Tablette (≤ 900px) → 2 colonnes */
        @media (max-width: 900px) {
            .certi {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 0 15px;
            }

            .certi img {
                padding: 8px;
            }

            nav ul {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
                padding: 0;
                margin: 10px 0 0;
            }

            nav ul li {
                display: inline-block;
                margin: 4px 8px;
            }
        }

        /* Mobile (≤ 600px) → 1 colonne */
        @media (max-width: 600px) {
            .certi {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 0 12px;
                margin: 16px auto;
            }

            .certi img {
                padding: 6px;
                max-width: 100%;
            }

            header {
                padding: 14px 10px;
            }

            header h1 {
                font-size: 1.2rem;
                padding: 0 8px;
            }

            nav ul {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 0;
                margin: 10px 0 0;
            }

            nav ul li {
                display: block;
                margin: 6px 0;
            }

            nav ul li a {
                font-size: 1rem;
            }
        }

        /* Très petit (≤ 380px) */
        @media (max-width: 380px) {
            header h1 {
                font-size: 1rem;
            }

            .certi {
                padding: 0 8px;
            }
        }
    </style>
</head>
